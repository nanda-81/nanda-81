name: Refresh profile signal

on:
  workflow_dispatch:
  push:
    paths:
      - "profile-data.json"
      - "scripts/**"
      - "README.md"
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run update
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Reject excluded project from profile
        run: '! grep -i "Cotiviti_Assessment" README.md'
      - name: Commit refreshed profile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh public profile signal"
          files: README.md
